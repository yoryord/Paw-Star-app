<section class="auth-page py-5 py-lg-6">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-sm-10 col-md-8 col-lg-6">

        <div class="auth-card p-4 p-md-5">

          <!-- Brand -->
          <div class="text-center mb-4">
            <a href="/" data-link class="auth-brand">Paw Star</a>
            <p class="auth-subtitle mt-1 mb-0">Join the community of pet lovers!</p>
          </div>

          <!-- Alert placeholder -->
          <div id="register-alert" class="auth-alert d-none" role="alert"></div>

          <!-- Form -->
          <form id="register-form" novalidate>

            <div class="row g-3 mb-3">
              <div class="col-12 col-sm-6">
                <label for="register-first-name" class="form-label auth-label">First name</label>
                <input
                  type="text"
                  id="register-first-name"
                  name="firstName"
                  class="form-control auth-input"
                  placeholder="Jane"
                  autocomplete="given-name"
                  required
                  minlength="2"
                />
                <div class="invalid-feedback">First name must be at least 2 characters.</div>
              </div>
              <div class="col-12 col-sm-6">
                <label for="register-last-name" class="form-label auth-label">Last name</label>
                <input
                  type="text"
                  id="register-last-name"
                  name="lastName"
                  class="form-control auth-input"
                  placeholder="Doe"
                  autocomplete="family-name"
                  required
                  minlength="2"
                />
                <div class="invalid-feedback">Last name must be at least 2 characters.</div>
              </div>
            </div>

            <div class="mb-3">
              <label for="register-email" class="form-label auth-label">Email address</label>
              <input
                type="email"
                id="register-email"
                name="email"
                class="form-control auth-input"
                placeholder="you@example.com"
                autocomplete="email"
                required
              />
              <div class="invalid-feedback">Please enter a valid email address.</div>
            </div>

            <div class="mb-3">
              <label for="register-password" class="form-label auth-label">Password</label>
              <div class="input-group auth-input-group">
                <input
                  type="password"
                  id="register-password"
                  name="password"
                  class="form-control auth-input"
                  placeholder="Min. 8 characters"
                  autocomplete="new-password"
                  required
                  minlength="8"
                />
                <button
                  type="button"
                  class="btn auth-toggle-password"
                  aria-label="Toggle password visibility"
                  data-target="register-password"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" class="eye-icon eye-open">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                  </svg>
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" class="eye-icon eye-slash d-none">
                    <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486z"/>
                    <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/>
                    <path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/>
                  </svg>
                </button>
              </div>
              <div class="invalid-feedback">Password must be at least 8 characters.</div>

              <!-- Password strength bar -->
              <div class="password-strength mt-2 d-none" id="password-strength-bar">
                <div class="strength-track">
                  <div class="strength-fill" id="strength-fill"></div>
                </div>
                <span class="strength-label" id="strength-label"></span>
              </div>
            </div>

            <div class="mb-4">
              <label for="register-confirm-password" class="form-label auth-label">Confirm password</label>
              <div class="input-group auth-input-group">
                <input
                  type="password"
                  id="register-confirm-password"
                  name="confirmPassword"
                  class="form-control auth-input"
                  placeholder="Repeat your password"
                  autocomplete="new-password"
                  required
                />
                <button
                  type="button"
                  class="btn auth-toggle-password"
                  aria-label="Toggle confirm password visibility"
                  data-target="register-confirm-password"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" class="eye-icon eye-open">
                    <path d="M16 8s-3-5.5-8-5.5S0 8 0 8s3 5.5 8 5.5S16 8 16 8M1.173 8a13 13 0 0 1 1.66-2.043C4.12 4.668 5.88 3.5 8 3.5s3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755C11.879 11.332 10.119 12.5 8 12.5s-3.879-1.168-5.168-2.457A13 13 0 0 1 1.172 8z"/>
                    <path d="M8 5.5a2.5 2.5 0 1 0 0 5 2.5 2.5 0 0 0 0-5M4.5 8a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0"/>
                  </svg>
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" class="eye-icon eye-slash d-none">
                    <path d="M13.359 11.238C15.06 9.72 16 8 16 8s-3-5.5-8-5.5a7 7 0 0 0-2.79.588l.77.771A6 6 0 0 1 8 3.5c2.12 0 3.879 1.168 5.168 2.457A13 13 0 0 1 14.828 8q-.086.13-.195.288c-.335.48-.83 1.12-1.465 1.755-.165.165-.337.328-.517.486z"/>
                    <path d="M11.297 9.176a3.5 3.5 0 0 0-4.474-4.474l.823.823a2.5 2.5 0 0 1 2.829 2.829zm-2.943 1.299.822.822a3.5 3.5 0 0 1-4.474-4.474l.823.823a2.5 2.5 0 0 0 2.829 2.829"/>
                    <path d="M3.35 5.47q-.27.24-.518.487A13 13 0 0 0 1.172 8l.195.288c.335.48.83 1.12 1.465 1.755C4.121 11.332 5.881 12.5 8 12.5c.716 0 1.39-.133 2.02-.36l.77.772A7 7 0 0 1 8 13.5C3 13.5 0 8 0 8s.939-1.721 2.641-3.238l.708.709zm10.296 8.884-12-12 .708-.708 12 12z"/>
                  </svg>
                </button>
              </div>
              <div class="invalid-feedback">Passwords do not match.</div>
            </div>

            <button type="submit" class="btn auth-submit-btn w-100" id="register-submit">
              <span class="btn-label">Create Account</span>
              <span class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
            </button>

          </form>

          <!-- Divider -->
          <div class="auth-divider my-4">
            <span>Already have an account?</span>
          </div>

          <a href="/login" data-link class="btn auth-secondary-btn w-100">
            Sign in
          </a>

        </div>
      </div>
    </div>
  </div>
</section>
