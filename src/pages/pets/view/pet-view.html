<section class="pet-view-page py-5 py-lg-6">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">

        <!-- Back link -->
        <a href="/" data-link class="pet-view-back-link mb-4 d-inline-flex align-items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
          </svg>
          Back
        </a>

        <!-- Loading state -->
        <div id="pet-view-loading" class="text-center py-5">
          <span class="spinner-border text-warning" style="width:2.5rem;height:2.5rem;" role="status" aria-label="Loading…"></span>
        </div>

        <!-- Error state -->
        <div id="pet-view-error" class="pet-view-alert alert-danger d-none" role="alert"></div>

        <!-- Content (hidden until loaded) -->
        <div id="pet-view-content" class="d-none">

          <!-- Hero card -->
          <div class="pet-view-hero mb-4">
            <div class="pet-view-avatar-wrap">
              <div class="pet-view-avatar-ring">
                <div class="pet-view-avatar-inner">
                  <span id="pet-view-avatar-fallback" class="pet-view-avatar-fallback" aria-hidden="true">🐾</span>
                  <img id="pet-view-avatar-img" class="pet-view-avatar-img d-none" alt="Pet picture" />
                </div>
              </div>
            </div>
            <div class="pet-view-hero-info">
              <h1 id="pet-view-name" class="pet-view-name mb-1"></h1>
              <p id="pet-view-species-badge" class="pet-view-species-badge mb-2"></p>
              <p class="pet-view-owner-line mb-0">
                <span class="pet-view-owner-label">Owner:</span>
                <span id="pet-view-owner"></span>
              </p>
            </div>
          </div>

          <!-- Details card -->
          <div class="pet-view-card mb-4">
            <div class="pet-view-card-header">
              <span class="pet-view-section-icon" aria-hidden="true">📋</span>
              <h2 class="pet-view-section-title">Details</h2>
            </div>
            <div class="pet-view-card-body">
              <dl class="pet-view-dl">

                <div class="pet-view-dl-row" id="pet-view-row-breed">
                  <dt class="pet-view-dt">Breed</dt>
                  <dd class="pet-view-dd" id="pet-view-breed">—</dd>
                </div>

                <div class="pet-view-dl-row" id="pet-view-row-birthdate">
                  <dt class="pet-view-dt">Date of Birth</dt>
                  <dd class="pet-view-dd" id="pet-view-birthdate">—</dd>
                </div>

                <div class="pet-view-dl-row" id="pet-view-row-birthplace">
                  <dt class="pet-view-dt">Place of Birth</dt>
                  <dd class="pet-view-dd" id="pet-view-birthplace">—</dd>
                </div>

                <div class="pet-view-dl-row" id="pet-view-row-location">
                  <dt class="pet-view-dt">Current Location</dt>
                  <dd class="pet-view-dd" id="pet-view-location">—</dd>
                </div>

                <div class="pet-view-dl-row pet-view-dl-row--top d-none" id="pet-view-row-about">
                  <dt class="pet-view-dt">About</dt>
                  <dd class="pet-view-dd pet-view-about-text" id="pet-view-about-text"></dd>
                </div>

              </dl>
            </div>
          </div>

          <!-- Owner actions (only rendered if viewer is owner) -->
          <div id="pet-view-owner-actions" class="d-none pet-view-actions mb-4">
            <a id="pet-view-edit-btn" href="#" data-link class="pet-view-edit-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" class="me-1">
                <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
              </svg>
              Edit Pet
            </a>
            <button id="pet-view-delete-btn" type="button" class="pet-view-delete-btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true" class="me-1">
                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
              </svg>
              Delete Pet
            </button>
          </div>

        </div><!-- /pet-view-content -->

      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal fade" id="pet-delete-modal" tabindex="-1" aria-labelledby="pet-delete-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content pet-view-modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="pet-delete-modal-label">Delete Pet Profile</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-2">
          <p class="mb-0">Are you sure you want to delete <strong id="pet-delete-modal-name"></strong>? This action <strong>cannot be undone</strong> and all related data will be permanently removed.</p>
        </div>
        <div class="modal-footer border-0 pt-0 gap-2">
          <button type="button" class="btn pet-view-modal-cancel-btn" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn pet-view-modal-delete-btn" id="pet-delete-modal-confirm">
            <span class="btn-label">Yes, delete</span>
            <span class="spinner-border spinner-border-sm d-none ms-1" role="status" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

</section>
