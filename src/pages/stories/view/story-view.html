<section class="story-view-page py-5 py-lg-6">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-md-10 col-lg-8 col-xl-7">

        <!-- Back link -->
        <a href="/stories" data-link class="story-view-back-link mb-4 d-inline-flex align-items-center gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
            <path fill-rule="evenodd" d="M15 8a.5.5 0 0 0-.5-.5H2.707l3.147-3.146a.5.5 0 1 0-.708-.708l-4 4a.5.5 0 0 0 0 .708l4 4a.5.5 0 0 0 .708-.708L2.707 8.5H14.5A.5.5 0 0 0 15 8"/>
          </svg>
          Back to Stories
        </a>

        <!-- Loading state -->
        <div id="story-view-loading" class="text-center py-5">
          <span class="spinner-border text-warning" style="width:2.5rem;height:2.5rem;" role="status" aria-label="Loading…"></span>
        </div>

        <!-- Error state -->
        <div id="story-view-error" class="story-view-alert alert-danger d-none" role="alert"></div>

        <!-- Content (hidden until loaded) -->
        <div id="story-view-content" class="d-none">

          <!-- Cover image -->
          <div id="story-view-cover-wrap" class="story-view-cover-wrap d-none mb-4">
            <img id="story-view-cover" class="story-view-cover-img" alt="Story cover" />
          </div>

          <!-- Title + meta -->
          <div class="story-view-header mb-4">
            <h1 id="story-view-title" class="story-view-title mb-3"></h1>

            <!-- Status badge (draft) -->
            <span id="story-view-draft-badge" class="story-view-draft-badge d-none">Draft</span>

            <div class="story-view-meta d-flex flex-wrap align-items-center gap-2">
              <!-- Owner line -->
              <span class="story-view-meta-icon" aria-hidden="true">👤</span>
              <span id="story-view-owner" class="story-view-meta-value"></span>

              <!-- Owner action buttons (owner only) -->
              <div id="story-view-owner-actions" class="d-none d-inline-flex align-items-center gap-1">
                <a id="story-view-edit-btn" href="#" data-link class="story-view-icon-btn story-view-icon-btn--edit" title="Edit story" aria-label="Edit story">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325"/>
                  </svg>
                </a>
                <button id="story-view-delete-btn" type="button" class="story-view-icon-btn story-view-icon-btn--delete" title="Delete story" aria-label="Delete story">
                  <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5m3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0z"/>
                    <path d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4zM2.5 3h11V2h-11z"/>
                  </svg>
                </button>
              </div>

              <span class="story-view-meta-sep" aria-hidden="true">·</span>
              <span class="story-view-meta-icon" aria-hidden="true">🗓️</span>
              <time id="story-view-date" class="story-view-meta-value"></time>
            </div>
          </div>

          <!-- Story content -->
          <article id="story-view-body" class="story-view-body"></article>

        </div><!-- /story-view-content -->

      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div class="modal fade" id="story-delete-modal" tabindex="-1" aria-labelledby="story-delete-modal-label" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content story-view-modal-content">
        <div class="modal-header border-0 pb-0">
          <h5 class="modal-title fw-bold" id="story-delete-modal-label">Delete Story</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body pt-2">
          <p class="mb-0">Are you sure you want to delete <strong id="story-delete-modal-title"></strong>? This action <strong>cannot be undone</strong>.</p>
        </div>
        <div class="modal-footer border-0 pt-0 gap-2">
          <button type="button" class="btn story-view-modal-cancel-btn" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn story-view-modal-delete-btn" id="story-delete-modal-confirm">
            <span class="btn-label">Yes, delete</span>
            <span class="spinner-border spinner-border-sm d-none ms-1" role="status" aria-hidden="true"></span>
          </button>
        </div>
      </div>
    </div>
  </div>

</section>
