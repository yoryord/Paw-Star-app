<section class="profile-page py-5 py-lg-6">
  <div class="container">
    <div class="row g-4 g-lg-5">
      <div class="col-12 col-lg-5">
        <section class="profile-card profile-main-card p-4 p-md-5 h-100">
          <div class="profile-photo-wrap mb-3">
            <div class="profile-photo-frame">
              <img id="public-profile-photo" class="profile-photo d-none" alt="Profile picture">
              <div id="public-profile-photo-fallback" class="profile-photo-fallback" aria-hidden="true">🐾</div>
            </div>
          </div>

          <h1 class="profile-name mb-1" id="public-profile-name">User Profile</h1>
          <p class="profile-email mb-3" id="public-profile-email">—</p>
        </section>
      </div>

      <div class="col-12 col-lg-7">
        <section class="profile-card p-4 p-md-5 h-100">
          <h2 class="profile-section-title mb-4">Profile details</h2>

          <dl class="row profile-details-list mb-0">
            <dt class="col-sm-4">Full name</dt>
            <dd class="col-sm-8" id="public-profile-detail-name">—</dd>

            <dt class="col-sm-4">Country</dt>
            <dd class="col-sm-8" id="public-profile-detail-country">—</dd>

            <dt class="col-sm-4">Member since:</dt>
            <dd class="col-sm-8" id="public-profile-detail-created">—</dd>

            <dt class="col-sm-4">About me</dt>
            <dd class="col-sm-8" id="public-profile-detail-about">—</dd>
          </dl>
        </section>
      </div>
    </div>

    <div id="public-profile-alert" class="alert d-none mt-4" role="alert"></div>
  </div>
</section>
